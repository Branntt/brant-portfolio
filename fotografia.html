<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotografía — Brant · Bacu Creative</title>
<meta name="description" content="Fotografía de retrato, editorial y documental, y una mirada detrás de escena al trabajo de Brant.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://tudominio.com/fotografia.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Brant — Portafolio">
<meta property="og:title" content="Fotografía — Brant">
<meta property="og:description" content="Retrato, editorial y documental — y una mirada detrás de escena.">
<meta property="og:image" content="https://tudominio.com/assets/img/reel-mustang.jpg">
<meta property="og:url" content="https://tudominio.com/fotografia.html">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M10 50 C25 20,75 20,90 50 C75 80,25 80,10 50 Z%22 fill=%22none%22 stroke=%22%232c6754%22 stroke-width=%228%22/><circle cx=%2250%22 cy=%2250%22 r=%2214%22 fill=%22none%22 stroke=%22%232c6754%22 stroke-width=%228%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<a href="#main" class="skip-link">Saltar al contenido</a>

<div id="preloader" aria-hidden="true">
  <img class="pre-logo" src="assets/img/icon-eye.png" alt="">
  <div class="pre-lines">
    <p class="pre-line-1">Estamos construyendo algo bien chimba.</p>
    <p class="pre-line-2">Gracias por esperar. Estamos preparando una experiencia hecha con detalle.</p>
  </div>
  <div class="pre-bar-track"><div class="pre-bar-fill"></div></div>
</div>

<div data-include="nav"></div>

<main id="main">

  <!-- TRES MIRADAS -->
  <section class="on-cream pad" style="padding-bottom:0">
    <div class="container reveal">
      <p class="section-index">01 / 02</p>
      <p class="kicker">Fotografía</p>
      <h1 class="h-serif section-title">Tres miradas</h1>

      <div class="mirada-grid" data-stagger>
        <div class="mirada tall">
          <figure>
            <img src="assets/img/reel-mustang.jpg" alt="Retrato" width="720" height="1280" loading="lazy">
          </figure>
          <div class="cap"><span>01 · Retrato</span></div>
        </div>
        <div class="mirada">
          <figure>
            <img src="assets/img/barbershop.jpg" alt="Editorial" width="1200" height="800" loading="lazy">
          </figure>
          <div class="cap"><span>02 · Editorial</span></div>
        </div>
        <div class="mirada">
          <figure>
            <img src="assets/img/night-crew.jpg" alt="Documental" width="1200" height="676" loading="lazy">
          </figure>
          <div class="cap"><span>03 · Documental</span></div>
        </div>
      </div>
    </div>
  </section>

  <!-- BTS -->
  <section class="on-dark pad">
    <div class="container reveal">
      <p class="section-index">02 / 02</p>
      <p class="kicker">Entre bastidores</p>
      <h2 class="h-serif section-title" style="color:var(--cream)">El set desde adentro</h2>

      <div class="bts-grid" data-stagger>
        <figure class="big">
          <img src="assets/img/night-crew.jpg" alt="Rodaje nocturno en equipo" width="1200" height="676" loading="lazy">
          <figcaption>Rodaje</figcaption>
        </figure>
        <figure>
          <img src="assets/img/studio-setup.jpg" alt="Equipo de producción en estudio" width="908" height="1210" loading="lazy">
          <figcaption>Equipo</figcaption>
        </figure>
        <figure>
          <img src="assets/img/barbershop.jpg" alt="Iluminación de set" width="1200" height="800" loading="lazy">
          <figcaption>Luces</figcaption>
        </figure>
        <figure>
          <img src="assets/img/camera-rig.jpg" alt="Cámara en gimbal" width="1400" height="933" loading="lazy">
          <figcaption>Cámara</figcaption>
        </figure>
        <figure class="big">
          <img src="assets/img/hill-gimbal.jpg" alt="Producción en locación" width="1070" height="1739" loading="lazy">
          <figcaption>Producción</figcaption>
        </figure>
        <figure>
          <img src="assets/img/edit-desk.jpg" alt="Detrás de escena, edición" width="800" height="1200" loading="lazy">
          <figcaption>Detrás de escena</figcaption>
        </figure>
      </div>
    </div>
  </section>

</main>

<div data-include="footer"></div>

<script src="js/preloader.js?v=2"></script>
<script src="js/include.js?v=2"></script>
<script src="js/main.js?v=2"></script>
</body>
</html>
